<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Carta ❤️</title>
<link rel="icon" href="android-icon-72x72.png" type="image/png">
<style>
:root{
  --bg:#fff8ef; --paper:#fffdf8; --accent:#6b4f4f; --text:#222; --font:"Georgia", serif; --padding:28px;
}
html,body{height:100%;margin:0;font-family:var(--font);background:var(--bg);color:var(--text);}
.wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:720px;max-width:95%;background:var(--paper);box-shadow:0 10px 30px rgba(0,0,0,0.12);border-radius:12px;padding:var(--padding);}
.title{font-size:20px;color:var(--accent);font-weight:700;margin-bottom:12px;text-align:center;}
.paper{max-height:70vh;overflow-y:auto;padding:20px;border-radius:8px;background:rgba(255,255,255,0.95);}
.letter{font-size:18px;line-height:1.7;color:var(--text);}
.footer{text-align:center;margin-top:20px;}
button{background:var(--accent);color:#fff;border:0;padding:10px 16px;border-radius:6px;cursor:pointer;font-size:15px;}
button:hover{opacity:0.9;}
@media (max-width:520px){
  .card{padding:16px;}
  .letter{font-size:16px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">De Alejandro para ti ❤️</div>
    <div class="paper">
      <div class="letter" id="letter">
        <!-- Aquí va tu carta completa -->
        Hace unos días, dentro de mis pensamientos, sentí que perdía la memoria, pero no del todo...
        <!-- (Pega todo tu texto aquí tal como lo escribiste) -->
      </div>
    </div>
    <div class="footer">
      <button id="finalButton">Cuando estés lista si lo estás presiona este botón, no antes</button><br>
      <a id="whatsappBtn" href="https://wa.me/+51937587368" target="_blank">Enviar WhatsApp</a>
      <a id="callBtn" href="tel:+51967028512">Llamar</a>
    </div>
  </div>
</div>

<!-- Audio: usa un archivo MP3 subido a tu repositorio -->
<audio id="audio1" src="audio/micancion.mp3" preload="auto"></audio>

<script>
const audio = document.getElementById('audio1');
let fadeRAF = null;

// Reproduce después de 5 segundos
window.addEventListener('load', () => {
  setTimeout(() => {
    audio.play().catch(()=>{});
    startFade();
  }, 5000);
});

// Fade out progresivo según duración estimada
function startFade(){
  const letterText = document.getElementById('letter').innerText;
  const words = letterText.trim().split(/\s+/).length;
  const readingTimeSec = Math.max(10, Math.round((words/200)*60)); // mínimo 10s
  const start = performance.now();

  function step(now){
    const t = Math.min(1, (now - start) / (readingTimeSec*1000));
    audio.volume = Math.max(0, 1 - t);
    if(t < 1) fadeRAF = requestAnimationFrame(step);
    else audio.pause();
  }
  fadeRAF = requestAnimationFrame(step);
}
</script>
</body>
</html>

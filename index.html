<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Atún ❤️</title>
<link rel="icon" href="android-icon-72x72.png" type="image/png">
<style>
:root{
  --bg:#fff8ef; --paper:#fffdf8; --accent:#6b4f4f; --text:#222; --font:"Georgia", serif; --padding:28px;
}
html,body{height:100%;margin:0;font-family:var(--font);background:var(--bg);color:var(--text);}
.wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:720px;max-width:95%;background:var(--paper);box-shadow:0 10px 30px rgba(0,0,0,0.12);border-radius:12px;padding:var(--padding);}
.title{font-size:20px;color:var(--accent);font-weight:700;margin-bottom:12px;text-align:center;}
.paper{max-height:70vh;overflow-y:auto;padding:20px;border-radius:8px;background:rgba(255,255,255,0.95);}
.letter{font-size:18px;line-height:1.7;color:var(--text);}
.footer{text-align:center;margin-top:20px;}
button, a.btn{
  display:inline-block;
  background:#ff81b6;
  color:#fff;
  border:0;
  padding:12px 20px;
  margin:10px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  text-decoration:none;
  font-weight:600;
  transition:transform 0.2s, background 0.2s;
}
button:hover, a.btn:hover{
  background:#f2619e;
  transform:scale(1.05);
}
.hidden{display:none;}
@media (max-width:520px){
  .card{padding:16px;}
  .letter{font-size:16px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">De ATÚN para TÚ ❤️</div>
    <div class="paper">
      <div class="letter" id="letter">
        <!-- Aquí pega tu carta completa -->
        Hace unos días, dentro de mis pensamientos, sentí que perdía la memoria...
      </div>
    </div>
    <div class="footer">
      <button id="finalButton">Cuando estés lista si lo estás presiona este botón, no antes</button><br>
      <a id="whatsappBtn" class="btn hidden" href="https://wa.me/+51900000000" target="_blank">Enviar WhatsApp</a>
      <a id="callBtn" class="btn hidden" href="tel:+51900000000">Llamar</a>
    </div>
  </div>
</div>

<!-- Audio -->
<audio id="audio1" src="audio/micancion.mp3" preload="auto"></audio>

<script>
const audio = document.getElementById('audio1');
const finalButton = document.getElementById('finalButton');
const whatsappBtn = document.getElementById('whatsappBtn');
const callBtn = document.getElementById('callBtn');

// Música después de 5 segundos
window.addEventListener('load', () => {
  setTimeout(() => {
    audio.play().catch(()=>{});
    startFade();
  }, 5000);
});

// Fade out progresivo
function startFade(){
  const letterText = document.getElementById('letter').innerText;
  const words = letterText.trim().split(/\s+/).length;
  const readingTimeSec = Math.max(10, Math.round((words/200)*60));
  const start = performance.now();

  function step(now){
    const t = Math.min(1, (now - start) / (readingTimeSec*1000));
    audio.volume = Math.max(0, 1 - t);
    if(t < 1) requestAnimationFrame(step);
    else audio.pause();
  }
  requestAnimationFrame(step);
}

// Botón final
finalButton.addEventListener('click', () => {
  alert("Gracias por leer mi carta ❤️");
  whatsappBtn.classList.remove('hidden');
  callBtn.classList.remove('hidden');
});
</script>
</body>
</html>
